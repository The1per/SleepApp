name: Build and Release SleepApp

on:
  push:
    tags:
      - 'v*' # Trigger on tags matching v*, e.g., v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        # Optional: any windows specific choco packages

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        pip uninstall -y pathlib pathlib2

    - name: Inject Google Drive Credentials
      env:
        GDRIVE_CREDENTIALS_JSON: ${{ secrets.GDRIVE_CREDENTIALS }}
      run: |
        echo "$env:GDRIVE_CREDENTIALS_JSON" > gdrive_credentials.json

    - name: Build App with PyInstaller
      run: |
        pyinstaller app.spec --clean -y

    - name: Create Zip Archive
      run: |
        Compress-Archive -Path dist\SleepApp\* -DestinationPath SleepApp-Release.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: SleepApp-Release.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
